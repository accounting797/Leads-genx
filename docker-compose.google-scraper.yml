# Local Google Maps scraper-kit provider for Leads-GenX.
# Wraps gosom/google-maps-scraper and binds only to localhost.
services:
  google-maps-scraper:
    image: gosom/google-maps-scraper
    container_name: leads-genx-gmaps-scraper
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command: ["rm -rf /opt/ms-playwright-go && exec google-maps-scraper -web -data-folder /gmapsdata"]
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - leads_genx_gmaps_data:/gmapsdata

volumes:
  leads_genx_gmaps_data:
